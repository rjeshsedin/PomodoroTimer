<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Pomodoro Timer</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>

  <div class="container">
    <h1 id="mode">Work</h1>
    <h2 id="time">25:00</h2>

    <div class="buttons">
      <button id="start">Start</button>
      <button id="pause">Pause</button>
      <button id="reset">Reset</button>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
